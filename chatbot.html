<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.groq.com">
    <title>Gemini Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="node_modules/prismjs/themes/prism-tomorrow.min.css">
  </head>
  <body>
    <div class="chat-container">
      <header>
        <div class="header-left">
          <div class="logo-icon">G</div>
          <h1>Gemini Chat</h1>
        </div>
        <div class="header-actions">
          <button id="settingsBtn" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
          <div class="settings-header">
            <h2>Settings</h2>
            <button id="settingsClose" title="Close">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div class="settings-body">
<div class="setting-group">
              <label>Theme</label>
              <div class="theme-toggle-row">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="5"/>
                  <line x1="12" y1="1" x2="12" y2="3"/>
                  <line x1="12" y1="21" x2="12" y2="23"/>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                  <line x1="1" y1="12" x2="3" y2="12"/>
                  <line x1="21" y1="12" x2="23" y2="12"/>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <span>Dark mode</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="themeCheckbox" checked>
                  <span class="toggle-slider"></span>
                </label>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              </div>
            </div>
            <div class="setting-group">
              <button id="historyBtn" class="setting-btn">
                Conversation history
              </button>
            </div>
            <div class="setting-group">
              <button id="newChatBtn" class="setting-btn">
                New chat
              </button>
            </div>
            <div class="setting-group">
              <button id="downloadBtn" class="setting-btn">
                Download chat
              </button>
            </div>
            <div class="setting-group">
              <button id="clearBtn" class="setting-btn setting-btn-danger">
                Clear all messages
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="history-overlay" id="historyOverlay">
        <div class="history-modal">
          <div class="settings-header">
            <h2>Conversation history</h2>
            <button id="historyClose" title="Close">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div class="history-list" id="historyList">
            <div class="history-empty">No saved conversations.</div>
          </div>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="input-area">
        <div class="file-preview" id="filePreview"></div>
        <div class="input-wrapper">
          <input type="file" id="fileInput" multiple hidden>
          <button id="attachBtn" title="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <textarea id="input" rows="1" placeholder="Ask anything..." autofocus></textarea>
          <button id="sendBtn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script src="node_modules/prismjs/prism.js"></script>
    <script src="node_modules/prismjs/components/prism-javascript.min.js"></script>
    <script src="node_modules/prismjs/components/prism-python.min.js"></script>
    <script src="node_modules/prismjs/components/prism-css.min.js"></script>
    <script src="node_modules/prismjs/components/prism-json.min.js"></script>
    <script src="node_modules/prismjs/components/prism-bash.min.js"></script>
    <script src="node_modules/prismjs/components/prism-sql.min.js"></script>
    <script src="node_modules/prismjs/components/prism-typescript.min.js"></script>
    <script src="node_modules/prismjs/components/prism-markup.min.js"></script>
    <script src="node_modules/prismjs/components/prism-java.min.js"></script>
    <script src="node_modules/prismjs/components/prism-c.min.js"></script>
    <script src="node_modules/prismjs/components/prism-cpp.min.js"></script>
    <script src="node_modules/prismjs/components/prism-rust.min.js"></script>
    <script src="node_modules/prismjs/components/prism-go.min.js"></script>
    <script src="node_modules/prismjs/components/prism-ruby.min.js"></script>
    <script src="node_modules/prismjs/components/prism-swift.min.js"></script>
    <script src="node_modules/prismjs/components/prism-kotlin.min.js"></script>
    <script src="node_modules/prismjs/components/prism-yaml.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
